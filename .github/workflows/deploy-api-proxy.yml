# Деплой HTTPS-прокси на Vercel (нужны секреты VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID).
# Без секретов — один раз вручную: api-proxy/README.md

name: Deploy API proxy (Vercel)

on:
  push:
    branches: [main]
    paths:
      - "api-proxy/**"
      - ".github/workflows/deploy-api-proxy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: api-proxy
          vercel-args: "--prod"
