# Кладёт сборку Vite в docs/ на ветке main.
# GitHub → Settings → Pages → Deploy from a branch → Branch: main → Folder: /docs
#
# Пуш коммитом GITHUB_TOKEN не запускает workflow повторно — зацикливания нет.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_BASE: ${{ endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Disable Jekyll for docs (use static Vite output as-is)
        run: touch dist/.nojekyll

      - name: Verify production bundle (not raw /src/)
        run: |
          if grep -qF '/src/main.tsx' dist/index.html; then
            echo 'ERROR: dist/index.html still has dev entry /src/main.tsx'
            exit 1
          fi
          grep -qE '/assets/.+\.(js|css)' dist/index.html || { echo 'ERROR: dist must reference built /assets/*.js|css'; exit 1; }

      - name: Publish dist to docs/ on main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          target-folder: docs
          clean: true
          commit-message: "chore: update GitHub Pages (docs/) [skip ci]"
