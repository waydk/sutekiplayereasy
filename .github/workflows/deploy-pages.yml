# Сборка Vite и публикация через GitHub Actions (артефакт dist).
# Репозиторий: Settings → Pages → Build and deployment → Source: GitHub Actions.
# Для user.github.io без подпути задайте имя репозитория *.github.io — тогда VITE_BASE=/.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_BASE: ${{ endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Disable Jekyll (static Vite output as-is)
        run: touch dist/.nojekyll

      - name: Verify production bundle (not raw /src/)
        run: |
          if grep -qF '/src/main.tsx' dist/index.html; then
            echo 'ERROR: dist/index.html still has dev entry /src/main.tsx'
            exit 1
          fi
          grep -qE '/assets/.+\.(js|css)' dist/index.html || { echo 'ERROR: dist must reference built /assets/*.js|css'; exit 1; }

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
