name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Проектный сайт: /имя-репо/; для USER.github.io — корень /
          VITE_BASE: ${{ endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build
      - name: Verify production bundle (not raw /src/)
        run: |
          if grep -qF '/src/main.tsx' dist/index.html; then
            echo 'ERROR: dist/index.html still has dev entry /src/main.tsx'
            exit 1
          fi
          grep -qE '/assets/.+\.(js|css)' dist/index.html || { echo 'ERROR: dist/index.html must reference built /assets/*.js|css'; exit 1; }
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
