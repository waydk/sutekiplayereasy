# Собирает Vite и пушит только dist в ветку gh-pages.
# GitHub: Settings → Pages → Source: Deploy from a branch → Branch: gh-pages / folder: / (root)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_BASE: ${{ endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build
      - name: Verify production bundle (not raw /src/)
        run: |
          if grep -qF '/src/main.tsx' dist/index.html; then
            echo 'ERROR: dist/index.html still has dev entry /src/main.tsx'
            exit 1
          fi
          grep -qE '/assets/.+\.(js|css)' dist/index.html || { echo 'ERROR: dist must reference built /assets/*.js|css'; exit 1; }
      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
